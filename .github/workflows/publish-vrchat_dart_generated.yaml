name: Publish vrchat_dart_generated to pub.dev

on:
    push:
        tags:
            - "vrchat_dart_generated-[0-9]+.[0-9]+.[0-9]+"

jobs:
    publish:
        permissions:
            id-token: write
        uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
        with:
            working-directory: vrchat_dart_generated
