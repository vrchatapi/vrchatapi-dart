name: Generate

on:
  repository_dispatch:
    types: [release]
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          cache: true

      - name: Pub cache
        uses: actions/cache@v4
        env:
          cache-name: root
        with:
          path: ${{ env.PUB_CACHE }}
          key: ${{ env.cache-name }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: ${{ env.cache-name }}-

      - name: Homebrew cache
        uses: actions/cache@v4
        with:
          path: |
            /home/linuxbrew/.linuxbrew
            /home/linuxbrew/.linuxbrew/Library/Taps
            /home/linuxbrew/.cache/Homebrew
            /home/linuxbrew/.linuxbrew/Cellar
            /home/linuxbrew/.linuxbrew/bin/brew
          key: ${{ runner.os }}-brew-${{ hashFiles('**/Brewfile') }}
          restore-keys: |
            ${{ runner.os }}-brew-

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Generate
        run: ./generate.sh

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Regenerated from spec"
          git push

      - name: Create and push tag
        run: |
          VERSION=$(grep '^version:' vrchat_dart_generated/pubspec.yaml | cut -d' ' -f2)
          TAG="vrchat_dart_generated-$VERSION"
          git tag "$TAG"
          git push origin "$TAG"

  publish:
    needs: generate
    permissions:
      id-token: write
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
    with:
      working-directory: vrchat_dart_generated
